name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + ninja
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build
      - name: Configure
        run: cmake --preset ninja-clang
      - name: Build
        run: cmake --build build/ninja-clang
      - name: Test
        run: ctest --test-dir build/ninja-clang --output-on-failure

  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake -S . -B build/gcc -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++
      - name: Build
        run: cmake --build build/gcc
      - name: Test
        run: ctest --test-dir build/gcc --output-on-failure

  macos-clang:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: brew install ninja
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build build/release
      - name: Test
        run: ctest --test-dir build/release --output-on-failure

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset msvc
      - name: Build
        run: cmake --build build/msvc --config Release
      - name: Test
        run: ctest --test-dir build/msvc -C Release --output-on-failure
